# =============================================================================
# ExamPro - Secure Online Examination System
# Full stack: distributed data layer + application microservices + Nginx edge.
# Run:  cp .env.example .env  &&  docker compose up -d --build
# Then open http://localhost  (Nginx serves the SPA and proxies /api -> gateway)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - relational source of truth (users, auth, exams, questions)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: exampro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exampro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exampro}
      POSTGRES_DB: ${POSTGRES_DB:-exampro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exampro} -d ${POSTGRES_DB:-exampro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  # ---------------------------------------------------------------------------
  # MongoDB - audit logs (hash chain), submissions, grading results
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: exampro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  # ---------------------------------------------------------------------------
  # Redis - OTP, session cache, rate limiting, Celery broker, pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: exampro-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  # ---------------------------------------------------------------------------
  # Neo4j - graph analytics (collusion rings, shared devices, multi-session)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: exampro-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-exampro-neo4j}
      NEO4J_server_memory_pagecache_size: 256M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  # ---------------------------------------------------------------------------
  # ChromaDB - vector store for semantic plagiarism detection
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:0.5.20
    container_name: exampro-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  # ===========================================================================
  # Application tier
  # ===========================================================================

  # API gateway (also runs auth-service in-process).
  gateway:
    build: ./server
    image: exampro/server
    container_name: exampro-gateway
    restart: unless-stopped
    command: ["node", "app.js"]
    environment:
      NODE_ENV: production
      GATEWAY_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_SECRET: ${JWT_SECRET}
      SERVICE_SECRET: ${SERVICE_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      MONGO_URI: mongodb://mongo:27017/auth
      AUTH_MONGO_URI: mongodb://mongo:27017/auth
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      USER_SERVICE_URL: http://user-service:3002
      EXAM_SERVICE_URL: http://exam:3003
      STUDENT_EXAM_SERVICE_URL: http://student-exam:3004
      GRADE_CHEAT_SERVICE_URL: http://grade-cheat:3005
      LOG_SERVICE_URL: http://log:3006
      RISK_SERVICE_URL: http://risk-service:3007
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  user-service:
    build: ./server/user-service
    image: exampro/user-service
    container_name: exampro-user
    restart: unless-stopped
    environment:
      NODE_ENV: production
      USER_PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-exampro}:${POSTGRES_PASSWORD:-exampro}@postgres:5432/${POSTGRES_DB:-exampro}
      MONGODB_URI: mongodb://mongo:27017/auth
    depends_on:
      postgres: { condition: service_healthy }
      mongo: { condition: service_healthy }
    expose:
      - "3002"
    networks:
      - exampro

  exam:
    image: exampro/server
    build: ./server
    container_name: exampro-exam
    restart: unless-stopped
    command: ["node", "src/modules/exam/server.js"]
    environment:
      NODE_ENV: production
      EXAM_PORT: 3003
      SERVICE_SECRET: ${SERVICE_SECRET}
      MONGO_URI: mongodb://mongo:27017/exam
    depends_on:
      mongo: { condition: service_healthy }
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  student-exam:
    image: exampro/server
    build: ./server
    container_name: exampro-student-exam
    restart: unless-stopped
    command: ["node", "src/modules/student-exam/server.js"]
    environment:
      NODE_ENV: production
      STUDENT_EXAM_PORT: 3004
      SERVICE_SECRET: ${SERVICE_SECRET}
      MONGO_URI: mongodb://mongo:27017/student_exam
      EXAM_SERVICE_URL: http://exam:3003
      RISK_SERVICE_URL: http://risk-service:3007
    depends_on:
      mongo: { condition: service_healthy }
    expose:
      - "3004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  log:
    image: exampro/server
    build: ./server
    container_name: exampro-log
    restart: unless-stopped
    command: ["node", "src/modules/log/app.js"]
    environment:
      NODE_ENV: production
      LOG_PORT: 3006
      SERVICE_SECRET: ${SERVICE_SECRET}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_LOGS: ${MONGODB_DB_LOGS:-exam_logs}
    depends_on:
      mongo: { condition: service_healthy }
    expose:
      - "3006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  risk-service:
    build: ./server/risk-service
    image: exampro/risk-service
    container_name: exampro-risk
    restart: unless-stopped
    environment:
      NODE_ENV: production
      RISK_PORT: 3007
      SERVICE_SECRET: ${SERVICE_SECRET}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-exampro-neo4j}
    depends_on:
      neo4j: { condition: service_healthy }
    expose:
      - "3007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  grade-cheat:
    build: ./server/src/modules/grade-cheat
    image: exampro/grade-cheat
    container_name: exampro-grade-cheat
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      GRADE_CHEAT_PORT: 3005
      SERVICE_SECRET: ${SERVICE_SECRET}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB_GRADING:-exam_grading}
      REDIS_URL: redis://redis:6379/0
      EXAM_BASE_URL: http://exam:3003/api/exam
      SUBMISSION_BASE_URL: http://student-exam:3004/api/v1/student-exam
      CHROMA_MODE: http
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
      chroma: { condition: service_started }
    expose:
      - "3005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - exampro

  # Celery worker shares the grade-cheat image; runs the async grading pipeline.
  grade-cheat-worker:
    image: exampro/grade-cheat
    build: ./server/src/modules/grade-cheat
    container_name: exampro-grade-cheat-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
    environment:
      SERVICE_SECRET: ${SERVICE_SECRET}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB_GRADING:-exam_grading}
      REDIS_URL: redis://redis:6379/0
      EXAM_BASE_URL: http://exam:3003/api/exam
      SUBMISSION_BASE_URL: http://student-exam:3004/api/v1/student-exam
      CHROMA_MODE: http
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      redis: { condition: service_healthy }
      grade-cheat: { condition: service_started }
    networks:
      - exampro

  # Nginx edge: serves the built SPA and reverse-proxies /api to the gateway.
  frontend:
    build: ./frontend
    image: exampro/frontend
    container_name: exampro-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - gateway
    networks:
      - exampro

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  neo4j_data:
  chroma_data:

networks:
  exampro:
    driver: bridge
